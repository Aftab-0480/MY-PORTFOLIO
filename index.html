<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='25' fill='%23121416'/%3E%3Ctext x='50' y='64' font-size='36' font-family='monospace, sans-serif' font-weight='900' fill='%23ffffff' text-anchor='middle' letter-spacing='-2'%3E%26lt;AA/%26gt;%3C/text%3E%3C/svg%3E"

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <style>
      .dark-stone-finish {
        /* Base Deep Charcoal/Volcanic Tone Core */
        background-color: #121416 !important; 
        position: relative;
        min-height: 100vh;
      }
      
      .dark-stone-finish::before {
        content: "";
        position: fixed;
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%;
        pointer-events: none;
        z-index: 0;
        opacity: 0.07; /* Keeps the fracture veins subtle and organic */
        mix-blend-mode: screen;
        
        /* High-octave fractal noise generating those sharp crystalline mineral fissure tracks */
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='stoneFractureGlobal'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.015' numOctaves='5' result='noise'/%3E%3CfeComponentTransfer%3E%3CfeFuncR type='linear' slope='3'/%3E%3CfeFuncG type='linear' slope='3'/%3E%3CfeFuncB type='linear' slope='3'/%3E%3C/feComponentTransfer%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23stoneFractureGlobal)'/%3E%3C/svg%3E");
      }
    </style>
  </head>
  <body class="dark-stone-finish text-stone-200 min-h-screen antialiased">
    <div id="root" class="relative z-10"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
